services:
  stalwart:
    image: stalwartlabs/stalwart:latest
    restart: unless-stopped
    ports:
      - "25:25"
      - "465:465"
      - "587:587"
      - "143:143"
      - "993:993"
      - "8080:8080"
    environment:
      - STALWART_RECOVERY_ADMIN=${STALWART_RECOVERY_ADMIN:-admin:change-me}
    volumes:
      - stalwart_etc:/etc/stalwart
      - stalwart_data:/var/lib/stalwart

  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: kasemail
      POSTGRES_USER: kasemail
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  panel:
    image: ghcr.io/yourorg/kasemail-panel:latest
    restart: unless-stopped
    depends_on: [postgres, redis]
    environment:
      DATABASE_URL: postgres://kasemail:${POSTGRES_PASSWORD}@postgres:5432/kasemail
      REDIS_URL: redis://redis:6379/0
      MAIL_CORE: stalwart
    expose:
      - "3000"

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  stalwart_etc:
  stalwart_data:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
